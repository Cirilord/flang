pre-commit:
  commands:
    format:
      glob: '**/*.{js,jsx,ts,tsx,json}'
      env:
        DOTENV_CONFIG_PATH: .env
      run: ./node_modules/.bin/prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: 'src/**/*.{js,jsx,ts,tsx}'
      env:
        DOTENV_CONFIG_PATH: .env
      run: ./node_modules/.bin/eslint --fix {staged_files}
      stage_fixed: true
    test:
      glob: '{src,examples}/**/*.{ts,tsx,f}'
      env:
        DOTENV_CONFIG_PATH: .env
      run: node --experimental-vm-modules ./node_modules/.bin/jest --watchman=false
    type-check:
      glob: 'src/**/*.{ts,tsx}'
      env:
        DOTENV_CONFIG_PATH: .env
      run: ./node_modules/.bin/tsc --noEmit -p tsconfig.json
